<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion — Albexia</title>
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/auth.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body class="auth-body">

  <!-- Logo centré -->
  <a href="index.html" class="auth-logo">
    <svg viewBox="0 0 130 36" xmlns="http://www.w3.org/2000/svg" height="28" aria-label="Albexia">
      <polygon points="2,10 14,32 10,32"  fill="#ff6b9d"/>
      <polygon points="14,2 18,12 10,12"  fill="#ff6b9d" opacity="0.6"/>
      <polygon points="26,10 14,32 18,32" fill="#ff6b9d"/>
      <text x="36" y="26" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#f0f0f5" letter-spacing="-0.5">
        Albe<tspan fill="#ff6b9d">x</tspan>ia
      </text>
    </svg>
  </a>

  <main class="auth-wrap">
    <div class="auth-card">

      <!-- Onglets -->
      <div class="auth-tabs" role="tablist">
        <button class="auth-tab active" id="tab-login"  data-tab="login"  role="tab">Connexion</button>
        <button class="auth-tab"        id="tab-signup" data-tab="signup" role="tab">Créer un compte</button>
      </div>

      <!-- Message erreur / succès -->
      <div class="auth-message" id="auth-message" style="display:none"></div>

      <!-- ── FORMULAIRE CONNEXION ── -->
      <div class="auth-form-wrap active" id="form-login">
        <div class="auth-form">

          <div class="form-group">
            <label class="form-label" for="login-email">Email</label>
            <input type="email" id="login-email" class="form-input" placeholder="votre@email.com" autocomplete="email" />
          </div>

          <div class="form-group">
            <label class="form-label" for="login-password">
              Mot de passe
              <a href="#" class="forgot-link" id="forgot-link">Oublié ?</a>
            </label>
            <div class="input-password-wrap">
              <input type="password" id="login-password" class="form-input" placeholder="••••••••" autocomplete="current-password" />
              <button class="toggle-pw" type="button" data-target="login-password">👁</button>
            </div>
          </div>

          <button class="btn-auth" id="btn-login">Se connecter</button>

          <div class="auth-divider"><span>ou</span></div>

          <button class="btn-google" id="btn-google-login">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
              <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
              <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.859-3.048.859-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
              <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
              <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
            </svg>
            Continuer avec Google
          </button>

        </div>
      </div>

      <!-- ── FORMULAIRE INSCRIPTION ── -->
      <div class="auth-form-wrap" id="form-signup">
        <div class="auth-form">

          <div class="form-group">
            <label class="form-label" for="signup-username">Pseudo</label>
            <input type="text" id="signup-username" class="form-input" placeholder="votre pseudo" autocomplete="username" maxlength="30" />
          </div>

          <div class="form-group">
            <label class="form-label" for="signup-email">Email</label>
            <input type="email" id="signup-email" class="form-input" placeholder="votre@email.com" autocomplete="email" />
          </div>

          <div class="form-group">
            <label class="form-label" for="signup-password">Mot de passe</label>
            <div class="input-password-wrap">
              <input type="password" id="signup-password" class="form-input" placeholder="8 caractères minimum" autocomplete="new-password" />
              <button class="toggle-pw" type="button" data-target="signup-password">👁</button>
            </div>
            <div class="password-strength" id="pw-strength"></div>
          </div>

          <button class="btn-auth" id="btn-signup">Créer mon compte</button>

          <div class="auth-divider"><span>ou</span></div>

          <button class="btn-google" id="btn-google-signup">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
              <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
              <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.859-3.048.859-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
              <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
              <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
            </svg>
            S'inscrire avec Google
          </button>

          <p class="auth-terms">
            En créant un compte, vous acceptez nos
            <a href="mentions-legales.html">Conditions d'utilisation</a>
            et notre
            <a href="politique-confidentialite.html">Politique de confidentialité</a>.
          </p>

        </div>
      </div>

      <!-- ── FORMULAIRE MOT DE PASSE OUBLIÉ ── -->
      <div class="auth-form-wrap" id="form-reset">
        <div class="auth-form">
          <p class="reset-intro">Entrez votre email pour recevoir un lien de réinitialisation.</p>
          <div class="form-group">
            <label class="form-label" for="reset-email">Email</label>
            <input type="email" id="reset-email" class="form-input" placeholder="votre@email.com" />
          </div>
          <button class="btn-auth" id="btn-reset">Envoyer le lien</button>
          <button class="btn-ghost-sm" id="btn-back-login">← Retour à la connexion</button>
        </div>
      </div>

    </div>
  </main>

  <script type="module">
    import { supabase, signUp, signIn, signInWithGoogle, getUser } from './js/supabase.js';

    /* Rediriger si déjà connecté */
    getUser().then(user => {
      if (user) window.location.href = 'profile.html';
    });

    /* ── ONGLETS ── */
    const tabs = document.querySelectorAll('.auth-tab');
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.auth-form-wrap').forEach(f => f.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('form-' + tab.dataset.tab).classList.add('active');
        hideMessage();
      });
    });

    /* ── MOT DE PASSE OUBLIÉ ── */
    document.getElementById('forgot-link').addEventListener('click', e => {
      e.preventDefault();
      document.querySelectorAll('.auth-form-wrap').forEach(f => f.classList.remove('active'));
      document.getElementById('form-reset').classList.add('active');
      tabs.forEach(t => t.classList.remove('active'));
    });
    document.getElementById('btn-back-login').addEventListener('click', () => {
      document.querySelectorAll('.auth-form-wrap').forEach(f => f.classList.remove('active'));
      document.getElementById('form-login').classList.add('active');
      document.getElementById('tab-login').classList.add('active');
    });

    /* ── TOGGLE MOT DE PASSE ── */
    document.querySelectorAll('.toggle-pw').forEach(btn => {
      btn.addEventListener('click', () => {
        const input = document.getElementById(btn.dataset.target);
        input.type = input.type === 'password' ? 'text' : 'password';
        btn.textContent = input.type === 'password' ? '👁' : '🙈';
      });
    });

    /* ── FORCE MOT DE PASSE ── */
    document.getElementById('signup-password').addEventListener('input', function () {
      const val = this.value;
      const el  = document.getElementById('pw-strength');
      let strength = 0;
      if (val.length >= 8)          strength++;
      if (/[A-Z]/.test(val))        strength++;
      if (/[0-9]/.test(val))        strength++;
      if (/[^A-Za-z0-9]/.test(val)) strength++;

      const labels = ['', 'Faible', 'Moyen', 'Bon', 'Fort'];
      const colors = ['', '#e05c5c', '#f0a030', '#6cc', '#4caf50'];
      el.innerHTML = val ? `<div class="pw-bar"><div class="pw-fill" style="width:${strength*25}%;background:${colors[strength]}"></div></div><span style="color:${colors[strength]}">${labels[strength]}</span>` : '';
    });

    /* ── MESSAGES ── */
    function showMessage(msg, type = 'error') {
      const el = document.getElementById('auth-message');
      el.textContent = msg;
      el.className   = 'auth-message auth-message--' + type;
      el.style.display = 'block';
    }
    function hideMessage() {
      document.getElementById('auth-message').style.display = 'none';
    }

    function setLoading(btn, loading) {
      btn.disabled    = loading;
      btn.dataset.orig = btn.dataset.orig || btn.textContent;
      btn.textContent = loading ? '...' : btn.dataset.orig;
    }

    /* ── CONNEXION ── */
    document.getElementById('btn-login').addEventListener('click', async () => {
      const email    = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const btn      = document.getElementById('btn-login');

      if (!email || !password) { showMessage('Veuillez remplir tous les champs.'); return; }
      setLoading(btn, true); hideMessage();

      try {
        await signIn(email, password);
        window.location.href = 'profile.html';
      } catch (err) {
        showMessage(translateError(err.message));
      } finally {
        setLoading(btn, false);
      }
    });

    /* ── INSCRIPTION ── */
    document.getElementById('btn-signup').addEventListener('click', async () => {
      const username = document.getElementById('signup-username').value.trim();
      const email    = document.getElementById('signup-email').value.trim();
      const password = document.getElementById('signup-password').value;
      const btn      = document.getElementById('btn-signup');

      if (!username || !email || !password) { showMessage('Veuillez remplir tous les champs.'); return; }
      if (password.length < 8)              { showMessage('Le mot de passe doit contenir au moins 8 caractères.'); return; }
      setLoading(btn, true); hideMessage();

      try {
        await signUp(email, password, username);
        showMessage('Compte créé ! Vérifiez votre email pour confirmer.', 'success');
      } catch (err) {
        showMessage(translateError(err.message));
      } finally {
        setLoading(btn, false);
      }
    });

    /* ── GOOGLE ── */
    document.getElementById('btn-google-login').addEventListener('click',  signInWithGoogle);
    document.getElementById('btn-google-signup').addEventListener('click', signInWithGoogle);

    /* ── RESET MOT DE PASSE ── */
    document.getElementById('btn-reset').addEventListener('click', async () => {
      const email = document.getElementById('reset-email').value.trim();
      const btn   = document.getElementById('btn-reset');
      if (!email) { showMessage('Entrez votre email.'); return; }
      setLoading(btn, true); hideMessage();

      try {
        const { error } = await supabase.auth.resetPasswordForEmail(email, {
          redirectTo: window.location.origin + '/auth.html'
        });
        if (error) throw error;
        showMessage('Email envoyé ! Vérifiez votre boîte de réception.', 'success');
      } catch (err) {
        showMessage(translateError(err.message));
      } finally {
        setLoading(btn, false);
      }
    });

    /* ── ENTRÉE CLAVIER ── */
    document.getElementById('login-password').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('btn-login').click();
    });
    document.getElementById('signup-password').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('btn-signup').click();
    });

    /* ── TRADUCTION ERREURS ── */
    function translateError(msg) {
      if (msg.includes('Invalid login'))         return 'Email ou mot de passe incorrect.';
      if (msg.includes('Email not confirmed'))   return 'Veuillez confirmer votre email.';
      if (msg.includes('already registered'))    return 'Un compte existe déjà avec cet email.';
      if (msg.includes('Password should be'))    return 'Le mot de passe doit contenir au moins 6 caractères.';
      if (msg.includes('Unable to validate'))    return 'Email invalide.';
      if (msg.includes('rate limit'))            return 'Trop de tentatives. Attendez quelques minutes.';
      return 'Une erreur est survenue. Réessayez.';
    }
  </script>

</body>
</html>
