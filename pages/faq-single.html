<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ═══ PERSONNALISER PAR PAGE ═══════════════════════════
    - <title>
    - <meta name="description">
    - og:title, og:description, og:url
    - Schema.org : name + text de l'Answer
    - hreflang href
  ════════════════════════════════════════════════════════ -->
  <title><!-- QUESTION --> — FAQ Albexia</title>
  <meta name="description" content="<!-- DESCRIPTION -->" />

  <!-- Open Graph -->
  <meta property="og:title"       content="<!-- QUESTION --> — FAQ Albexia" />
  <meta property="og:description" content="<!-- DESCRIPTION -->" />
  <meta property="og:type"        content="article" />
  <meta property="og:url"         content="https://albexia.com/faq/<!-- ID -->/" />
  <meta property="og:image"       content="/assets/preview.jpg" />

  <!-- hreflang -->
  <link rel="alternate" hreflang="fr" href="https://albexia.com/faq/<!-- ID -->/" />

  <!-- Schema.org FAQPage individuelle -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {
        "@type": "Question",
        "name": "<!-- QUESTION -->",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "<!-- RÉPONSE RAPIDE EN TEXTE BRUT (sans HTML) -->"
        }
      }
    ]
  }
  </script>

  <link rel="stylesheet" href="/style.css" />
  <link rel="stylesheet" href="/css/faq.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
